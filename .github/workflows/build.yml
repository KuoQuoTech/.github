name: Deploy KuoQuo Docs Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # 3. Install Zensical
      - name: Install Zensical
        run: pip install zensical

      # 4. Build site
      - name: Build site
        run: zensical build --clean

      # 5. Fetch Pivot site (from gh-pages branch)
      - name: Fetch Pivot site
        run: |
          echo "Cloning Pivot gh-pages branch into site/pivot..."

          rm -rf site/pivot
          git clone --depth 1 --branch gh-pages https://github.com/KuoQuoTech/KuoQuo-Pivot.git site/pivot

          # Remove git history so it can be deployed cleanly
          rm -rf site/pivot/.git

      # 6. Deploy to gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          cname: docs.kuoquo.com