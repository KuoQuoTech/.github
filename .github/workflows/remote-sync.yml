name: Update Pivot Content

on:
  repository_dispatch:
    types: [update_submodule]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout gh-pages branch
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Replace pivot content with latest from remote
      - name: Update Pivot from remote
        run: |
          echo "Fetching latest Pivot gh-pages..."

          # Remove old content
          rm -rf pivot

          # Clone latest Pivot gh-pages
          git clone --depth 1 --branch gh-pages https://github.com/KuoQuoTech/KuoQuo-Pivot.git pivot

          # Remove git metadata
          rm -rf pivot/.git

      # 3. Commit & push changes
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pivot
          git commit -m "chore: sync pivot from upstream gh-pages" || echo "No changes"

          git push